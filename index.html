<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no,viewport-fit=cover" />
  <title>W:E:go Backstage Hunt Prototype</title>
  <link rel="stylesheet" href="styles/style.css" />
</head>
<body>
  <canvas id="game"></canvas>

  <div class="menu" id="menu">
    <div class="panel">
      <h1>W:E:go Backstage Hunt</h1>
      <div class="sub">
        鬼には視野とスタミナがある。見られなければバレにくいし、追いかけすぎた鬼は息切れする。
      </div>
      <div class="difficulty-grid">
        <button class="difficulty" data-level="easy">
          <b>Easy</b>
          <span>鬼 3体。視野は控えめ、スタミナもゆるめ。</span>
        </button>
        <button class="difficulty" data-level="normal">
          <b>Normal</b>
          <span>鬼 5体。基本バランス。</span>
        </button>
        <button class="difficulty" data-level="hard">
          <b>Hard</b>
          <span>鬼 8体。視野と索敵が強め。</span>
        </button>
        <button class="difficulty" data-level="nightmare">
          <b>Nightmare</b>
          <span>鬼 12体。逃げ場、だいぶない。</span>
        </button>
      </div>
    </div>
  </div>

  <div class="ui">
    <div><b>W:E:go Backstage Hunt</b></div>
    <div>Difficulty: <span id="difficulty">-</span></div>
    <div>Seekers: <span id="seekers">0</span></div>
    <div>Score: <span id="score">0</span></div>
    <div>Heat: <span id="heat">0</span>%</div>
    <div>Time: <span id="time">0</span>s</div>
    <div>Mode: <span id="mode">waiting</span></div>
  </div>

  <div class="hint">
    <b>操作</b><br>
    PC：WASD / 矢印キーで移動、Spaceで変身、Shiftでダッシュ<br>
    スマホ：左スティックで移動、右ボタンでダッシュ・変身<br>
    R: 緊急リロード / Esc: タイトルへ戻る<br><br>
    鬼の白い扇形が視野。背後なら見つかりにくい。
  </div>

  <div id="mobileControls" class="mobile-controls" aria-hidden="true">
    <div id="joystick" class="joystick">
      <div id="joystickKnob" class="joystick-knob"></div>
    </div>
    <button id="dashButton" class="mobile-button dash-button" type="button">🏃</button>
    <button id="disguiseButton" class="mobile-button disguise-button" type="button">🎭</button>
  </div>

  <button id="restart">もう一回</button>

  <script src="scripts/config.js"></script>
  <script src="scripts/utils.js"></script>
  <script src="scripts/map.js"></script>
  <script src="scripts/player.js"></script>
  <script src="scripts/ai.js"></script>
  <script src="scripts/render.js"></script>
  <script src="scripts/mobile.js"></script>
  <script src="scripts/ui-mobile.js"></script>
  <script src="scripts/debug.js"></script>
  <script src="scripts/main.js"></script>
</body>
</html>
